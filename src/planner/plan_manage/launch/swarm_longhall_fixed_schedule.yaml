      thickness: 0.4
      template_back_offset: 1.05
      template_primary_span: 1.15
      template_aux_span: 0.18
      template_leader_bias_local: [0.0, 0.0, 0.0]

    - id: 4
      name: "ring2"
      type: "RING"
      center: [14.0, 1.5, 1.5]
      forward_axis: [0.965926, 0.0, 0.258819]
      primary_axis: [0.965926, 0.0, 0.258819]
      auxiliary_axis: [-0.258819, 0.0, 0.965926]
      local_y_axis: [0.0, 1.0, 0.0]
