swarm_master:
  use_fixed_obstacle_schedule: true
  disable_online_classification: true
  leader_corrected_topic: "/swarm/leader/corrected_bezier"
  leader_state_topic: "/visual_slam/odom"

  payload:
    rope_length: 1.0
    radius: 0.2
    extra_margin: 0.06
    triangle_area_min: 0.05
    inter_uav_sep_min: 0.85
    samples_per_seg: 3

  cooperative_opt:
    w_smooth: 10.0
    w_feas: 1.0
    w_uav_obs: 110.0
    w_leader_ref: 55.0
    w_mode_shape: 35.0
    w_payload_feas: 140.0
    w_payload_obs: 180.0
    w_sep: 50.0
    payload_invalid_penalty: 2200.0
    max_iterations: 60
    finite_diff_eps: 0.001
    obstacle_search_radius: 1.6

  fixed_obstacle_schedule:
    - id: 0
      name: "door1"
      type: "DOOR_FRAME"
      center: [-12.0, 1.5, 1.5]
      forward_axis: [1.0, 0.0, 0.0]
      primary_axis: [0.0, 0.0, 1.0]
      auxiliary_axis: [0.0, 1.0, 0.0]
      local_y_axis: [0.0, 1.0, 0.0]
      local_z_axis: [0.0, 0.0, 1.0]
      physical_half_extent: 0.2
      activation_window_enter: -0.2
      activation_window_exit: 0.2
      blend_in: 1.2
      blend_out: 1.2
      release_margin: 0.8
      opt_window_margin: 1
      gap_center_y: 0.0
      gap_width: 1.3
      thickness: 0.4
      template_back_offset: 1.05
      template_primary_span: 1.15
      template_aux_span: 0.18
      template_leader_bias_local: [0.0, 0.0, 0.0]

    - id: 1
      name: "ring1"
      type: "RING"
      center: [-7.0, 1.0, 1.5]
      forward_axis: [1.0, 0.0, 0.0]
      primary_axis: [1.0, 0.0, 0.0]
      auxiliary_axis: [0.0, 0.0, 1.0]
      local_y_axis: [0.0, 1.0, 0.0]
      local_z_axis: [0.0, 0.0, 1.0]
      physical_half_extent: 0.6
      activation_window_enter: -0.6
      activation_window_exit: 0.6
      blend_in: 1.2
      blend_out: 1.2
      release_margin: 0.8
      opt_window_margin: 1
      major_r: 1.8
      minor_r: 0.4
      template_back_offset: 1.0
      template_primary_span: 1.15
      template_aux_span: 0.28
      template_leader_bias_local: [0.0, 0.0, 0.18]

    - id: 2
      name: "slit"
      type: "Z_SLIT"
      center: [-2.0, 0.0, 1.3]
      forward_axis: [1.0, 0.0, 0.0]
      primary_axis: [0.0, 1.0, 0.0]
      auxiliary_axis: [0.0, 0.0, 1.0]
      local_y_axis: [0.0, 1.0, 0.0]
      local_z_axis: [0.0, 0.0, 1.0]
      physical_half_extent: 0.2
      activation_window_enter: -0.2
      activation_window_exit: 0.2
      blend_in: 1.2
      blend_out: 1.2
      release_margin: 0.8
      opt_window_margin: 1
      z_gap_low: 0.6
      z_gap_high: 2.0
      thickness: 0.4
      template_back_offset: 1.0
      template_primary_span: 1.4
      template_aux_span: 0.22
      template_leader_bias_local: [0.0, 0.0, 0.12]

    - id: 3
      name: "door2"
      type: "DOOR_FRAME"
      center: [6.0, -0.5, 1.5]
      forward_axis: [1.0, 0.0, 0.0]
      primary_axis: [0.0, 0.0, 1.0]
      auxiliary_axis: [0.0, 1.0, 0.0]
      local_y_axis: [0.0, 1.0, 0.0]
